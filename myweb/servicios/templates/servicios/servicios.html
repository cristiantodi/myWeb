{% extends "appmyweb/base.html" %}

{% load static %}

{% block content %}



    <hr class="featurette-divider">
    {% for servicio in servicios %}     
        <div class="container marketing">
            <div class="row featurette">
                <div class="col-md-7">
                    <h2 class="featurette-heading">{{servicio.titulo}} <span class="text-muted"></span></h2>
                    <p class="lead">{{servicio.contenido}}</p>
                </div>
                <div class="col-md-5">
                    <img class="bd-placeholder-img bd-placeholder-img-lg featurette-image img-fluid mx-auto" width="500" height="500" preserveAspectRatio="xMidYMid slice"  src="{{servicio.imagen.url}}"> <!-- 500x500-->               
                </div>
            <hr class="featurette-divider">
            </div>
        </div>   
    {% endfor %}                    <!-- FIN DEL CONTENIDO DE LA PAGINA -->

{% endblock %}
