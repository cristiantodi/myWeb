<html lang="en">
<head>
    <meta charset="utf-8">

    {% load static %}

<!-- Bootstrap core CSS -->
<link href="{% static 'appmyweb/bootstrap.min.css' %}" rel="stylesheet">
<script src="{% static 'appmyweb/bootstrap.bundle.min.js' %}"></script>
<!-- Custom styles for this template -->
<link href="{% static 'appmyweb/carousel.css' %}" rel="stylesheet">
<link href="{% static 'appmyweb/product.css' %}" rel="stylesheet">




    <style>
      .bd-placeholder-img {
        font-size: 1.125rem;
        text-anchor: middle;
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
      }

      @media (min-width: 768px) {
        .bd-placeholder-img-lg {
          font-size: 3.5rem;
        }
      }

    /*-------------------------------------------------------*/

    #header {
				margin:auto;
				width:500px;
				font-family:Arial, Helvetica, sans-serif;
			}
			
			ul, ol {
				list-style:none;
			}
			
			.nav {
				width:auto; /*Le establecemos un ancho*/
				margin:auto; /*Centramos automaticamente*/
			}

			.nav > li {
				float:left;
			}
			
			.nav li a {
				background-color:#212529;
				color:#fff;
				text-decoration:none;
				padding:10px 12px;
				display:block;
			}
			
			.nav li a:hover {
				background-color:#434343;
			}
			
			.nav li ul {
				display:none;
				position:absolute;
				min-width:140px;
			}
			
			.nav li:hover > ul {
				display:block;
			}
			
			.nav li ul li {
				position:relative;
			}
			
			.nav li ul li ul {
				right:-100%;
				top:0px;
			}

    /*----------------------------------------------------------*/
      
    </style>

    
    
</head>
<body>
    
  <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'Home'%}">Muebles de Adolfito</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav me-auto mb-2 mb-md-0">
          <li class="nav-item">
            <a class="nav-link navbar-brand {% if request.path == '/' %} active {% endif %}" aria-current="page" href="{% url 'Home'%}">Inicio</a>
          </li>
          
          
          <!-------------------------------------------------------------->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle navbar-brand {% if request.path == '/contacto' %} active {% endif %}" href="{% url 'Tienda'%}" data-bs-toggle="dropdown" aria-expanded="false">Tienda</a>
            <ul class="dropdown-menu" aria-labelledby="dropdown03">
              <li><a class="dropdown-item" href="#">Salas</a></li>
              <li><a class="dropdown-item" href="#">Comedor</a></li>
              <li><a class="dropdown-item" href="#">Camas</a></li>
            </ul>
          <!-------------------------------------------------------------->

          <li class="nav-item">
            <a class="nav-link navbar-brand {% if request.path == '/servicios' %} active {% endif %}" href="{% url 'Servicios'%}">Servicios</a>
          </li>
          
          <li class="nav-item">
            <a class="nav-link navbar-brand {% if request.path == '/contacto' %} active {% endif %}" href="{% url 'Contacto'%}">Contactenos</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

<!--Contenido Cambiante-->
{% block content %}



{% endblock %}

</footer>
    

      
</body>
</html>
