<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="Mark Otto, Jacob Thornton, and Bootstrap contributors">
    <meta name="generator" content="Hugo 0.88.1">
    

    {% load static %}

    
<link href="{% static 'appmyweb/bootstrap.min.css' %}" rel="stylesheet">
<script src="{% static 'appmyweb/bootstrap.bundle.min.js' %}"></script>

<link href="{% static 'appmyweb/carousel.css' %}" rel="stylesheet">
<link href="{% static 'appmyweb/myStyle.css' %}" rel="stylesheet">
<link href="{% static 'appmyweb/product.css' %}" rel="stylesheet">


	<!-- Add jQuery library -->
	<script type="text/javascript" src="http://code.jquery.com/jquery-latest.min.js"></script>

	<!-- Add fancyBox -->
	<link rel="stylesheet" href= "{% static 'appmyweb/jquery.fancybox.css' %}" type="text/css" media="screen" />
	<script type="text/javascript" src= "{% static 'appmyweb/jquery.fancybox.pack.js' %}"></script>

  <script>
    
    $(function(){
    
      $(".single-image").fancybox({
        openEffect : 'elastic',   //'fade', 'elastic'
          closeEffect	: 'elastic',
          openSpeed:'normal', //ms, slow, normal, fast (default 250ms)
          closeSpeed:'normal',
          helpers : {
            title : {
              type : 'inside' //'float', 'inside', 'outside' or 'over'
            },
            overlay : {
              closeClick : true  // if true, se cierra al hacer click fuera de la imagen
                }
          },
          padding:11
          
      });
      
    });
    
  </script>

</head>

<body>
    
  <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'Home'%}">Muebles de Adolfito</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav me-auto mb-2 mb-md-0">
          <li class="nav-item">
            <a class="nav-link navbar-brand {% if request.path == '/' %} active {% endif %}" aria-current="page" href="{% url 'Home'%}">Inicio</a>
          </li>

          <li class="nav-item">
            <a class="nav-link navbar-brand {% if request.path|slice:':8' == '/tienda/' %} active {% endif %}" href="{% url 'Tienda'%}">Tienda</a>
          </li>

          <li class="nav-item">
            <a class="nav-link navbar-brand {% if request.path == '/servicios/' %} active {% endif %}" href="{% url 'Servicios'%}">Servicios</a>
          </li>
          
          <li class="nav-item">
            <a class="nav-link navbar-brand {% if request.path == '/contacto/' %} active {% endif %}" href="{% url 'Contacto'%}">Contactenos</a>
          </li>
          
        </ul>
        <!-----  Carrito compra y Login  ----->
        <div class="d-flex align-items-center">

          <a href="{% url 'Compra' %}">
            <img src="{% static 'appmyweb/imagen/car3.png' %}" width="32" height="32">
          </a>

          <div  >
            {% if user.is_authenticated %}

            &nbsp; &nbsp;{{user.username}} &nbsp; &nbsp;  <a href="{% url 'cerrar_sesion' %}"> Cerrar sesion</a>

            {% else %}

              &nbsp; &nbsp;<a class="word-car-login" href="{% url 'login' %}"> Login </a> &nbsp; &nbsp;
              <a class="word-register" href="{% url 'Autenticacion' %}"> Registrar </a> &nbsp; &nbsp;

            {% endif %}
          </div>
          <!---------->
      </div>
      
    </div>
  </nav>

<!--Contenido Cambiante-->
{% block content %}



{% endblock %}

<!--Condiciones -->
<footer class="container">
  <p class="float-end"><a href="#">Back to top</a></p>
  <p>&copy;Todi - 2022, &middot; <a href="{% url 'Terminos'%}">Terminos y Condiciones</a></p>
</footer>
    

      
</body>
</html>
